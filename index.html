<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kanbghik Soumia 🎁</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html, body { height:100%; background:#0c0708; overflow:hidden; }
  body {
    display:flex; align-items:center; justify-content:center;
    font-family: Georgia, 'Times New Roman', serif;
    height:100vh; height:100dvh;
    background: radial-gradient(circle at 50% 40%, #241012 0%, #0c0708 70%);
  }

  #scene { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }

  /* étincelles ambiantes en arrière-plan */
  .ambient { position:absolute; font-size:16px; opacity:0.35; animation: drift 6s ease-in-out infinite; pointer-events:none; }
  @keyframes drift { 0%,100% { transform:translateY(0) rotate(0deg);} 50% { transform:translateY(-16px) rotate(8deg);} }

  .glow {
    position:absolute; width:220px; height:220px; border-radius:50%;
    background: radial-gradient(circle, rgba(255,90,90,0.35) 0%, rgba(255,90,90,0) 70%);
    animation: glowPulse 2.2s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes glowPulse { 0%,100% { transform:scale(1); opacity:0.6; } 50% { transform:scale(1.25); opacity:1; } }

  #gift {
    position:relative; z-index:5;
    font-size: 100px;
    cursor:pointer;
    animation: floatGift 2.6s ease-in-out infinite;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  @keyframes floatGift { 0%,100% { transform:translateY(0) rotate(-4deg);} 50% { transform:translateY(-10px) rotate(4deg);} }

  #gift.shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%,100% { transform:translateX(0) rotate(0deg); }
    20% { transform:translateX(-10px) rotate(-8deg); }
    40% { transform:translateX(10px) rotate(8deg); }
    60% { transform:translateX(-8px) rotate(-6deg); }
    80% { transform:translateX(8px) rotate(6deg); }
  }

  #gift.vanish {
    opacity:0;
    transform: scale(0.4);
    animation:none;
  }

  #tapHint {
    position:absolute; bottom:14%; left:0; right:0;
    text-align:center; font-size:26px;
    animation: bounce 1.4s ease-in-out infinite;
    transition: opacity 0.3s ease;
    pointer-events:none;
  }
  @keyframes bounce { 0%,100% { transform:translateY(0);} 50% { transform:translateY(-8px);} }

  #reveal {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
    transition: opacity 0.2s ease;
  }
  #reveal.show { opacity:1; pointer-events:auto; }

  .heart-pop {
    font-size: 110px;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) both, pulse 1.4s ease-in-out 0.6s infinite;
  }
  @keyframes popIn { from { transform:scale(0.2) translateY(20px); opacity:0; } to { transform:scale(1) translateY(0); opacity:1; } }
  @keyframes pulse { 0%,100% { transform:scale(1);} 50% { transform:scale(1.1);} }

  .reveal-text {
    margin-top: 22px;
    font-size: 32px;
    font-style: italic;
    color: #ffe3e3;
    opacity:0;
    animation: fadeUp 0.7s ease 0.5s forwards;
  }
  @keyframes fadeUp { to { opacity:1; transform:translateY(0); } from { opacity:0; transform:translateY(14px); } }

  .reveal-subtext {
    margin-top: 12px;
    font-size: 18px;
    font-style: italic;
    color: #d9a9a9;
    opacity:0;
    animation: fadeUp 0.7s ease 1s forwards;
  }

  .replay-hint {
    margin-top: 26px;
    font-size: 20px;
    opacity:0;
    animation: fadeUp 0.7s ease 2.1s forwards;
  }

  .particle {
    position:absolute; left:50%; top:50%; font-size:20px;
    transform: translate(-50%,-50%);
    animation: flyOut 0.9s ease-out forwards;
    pointer-events:none; z-index:4;
  }
  @keyframes flyOut {
    to { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity:0; }
  }
</style>
</head>
<body>

<div id="scene">
  <div class="ambient" style="top:16%; left:14%;">✨</div>
  <div class="ambient" style="top:22%; right:12%; animation-delay:1s;">💫</div>
  <div class="ambient" style="bottom:20%; left:10%; animation-delay:2s;">💛</div>
  <div class="ambient" style="bottom:26%; right:16%; animation-delay:1.6s;">✨</div>

  <div class="glow"></div>
  <div id="gift">🎁</div>
  <div id="tapHint">👆</div>

  <div id="reveal">
    <div class="heart-pop">❤️</div>
    <div class="reveal-text">Kanbghik a Soumia</div>
    <div class="reveal-subtext">Lkbida dyali, mkhllyani bla n3as hh </div>
    <div class="replay-hint">🔁</div>
  </div>
</div>

<script>
  const gift = document.getElementById('gift');
  const reveal = document.getElementById('reveal');
  const hint = document.getElementById('tapHint');
  const scene = document.getElementById('scene');

  let opened = false;
  let revealed = false;

  function spawnParticles() {
    const icons = ['❤️','✨','💛','💫','💕'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = icons[Math.floor(Math.random() * icons.length)];
      const angle = Math.random() * Math.PI * 2;
      const dist = 90 + Math.random() * 100;
      p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      scene.appendChild(p);
      setTimeout(() => p.remove(), 950);
    }
  }

  function openGift() {
    if (opened) return;
    opened = true;
    hint.style.opacity = '0';
    gift.classList.add('shake');

    setTimeout(() => {
      gift.classList.remove('shake');
      gift.classList.add('vanish');
      spawnParticles();

      setTimeout(() => {
        reveal.classList.add('show');
        revealed = true;
      }, 200);
    }, 500);
  }

  function resetScene() {
    revealed = false;
    opened = false;
    reveal.classList.remove('show');
    gift.classList.remove('vanish');
    hint.style.opacity = '1';
  }

  gift.addEventListener('click', openGift);

  scene.addEventListener('click', (e) => {
    if (revealed) resetScene();
  });
</script>

</body>
</html>
